version: '3.8'

services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-chatbot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent session storage
      - ./auth_info_baileys:/app/auth_info_baileys
      # Persistent conversation state
      - ./state:/app/state
      # QR code and public files
      - ./public:/app/public
    environment:
      - NODE_ENV=production
      - DEBUG=false
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  auth_info_baileys:
  state:
  public:
